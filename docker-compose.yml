version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: parliament_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parliament_alloc}
      POSTGRES_USER: ${POSTGRES_USER:-parliament}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parliament_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-parliament} -d ${POSTGRES_DB:-parliament_alloc}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: parliament_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parliament_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-parliament}:${POSTGRES_PASSWORD:-parliament_pass}@postgres:5432/${POSTGRES_DB:-parliament_alloc}
      JWT_SECRET: ${JWT_SECRET:-parliament_jwt_secret_change_in_production_min32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-parliament-photos}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parliament_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  postgres_data:
  minio_data:
